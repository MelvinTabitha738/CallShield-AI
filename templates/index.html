<!DOCTYPE html>
<html>
<head>
    <title>CallShield AI - Real-time</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; border-radius: 10px; font-size: 16px; }
        .tab.active { background: white; color: #667eea; }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .tab-content.active { display: block; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; min-height: 150px; resize: vertical; }
        button { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #5568d3; }
        .result { margin-top: 20px; padding: 20px; border-radius: 10px; }
        .spam { background: #fee; border-left: 4px solid #f44; }
        .ham { background: #efe; border-left: 4px solid #4f4; }
        .recording { background: #f44 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .file-label { display: block; padding: 15px; background: #f0f0f0; border: 2px dashed #ddd; border-radius: 10px; text-align: center; cursor: pointer; }
        .file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ CallShield AI - Real-time</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab(0)">💬 Text</button>
            <button class="tab" onclick="switchTab(1)">🎵 Audio</button>
            <button class="tab" onclick="switchTab(2)">🎤 Microphone</button>
        </div>

        <div class="tab-content active">
            <h2>Real-time Text Analysis</h2>
            <p style="color: #666; margin-bottom: 10px;">Type below - analysis happens automatically after 2 seconds</p>
            <textarea id="text-input" placeholder="Start typing..."></textarea>
            <div id="text-result"></div>
        </div>

        <div class="tab-content">
            <h2>Upload Audio File</h2>
            <input type="file" id="audio-file" class="file-input" accept=".wav,.mp3,.ogg,.m4a,.flac">
            <label for="audio-file" class="file-label">📁 Choose Audio File</label>
            <p id="file-name" style="margin-top: 10px; color: #666;"></p>
            <button onclick="analyzeAudio()">Analyze Audio</button>
            <div id="audio-result"></div>
        </div>

        <div class="tab-content">
            <h2>Live Microphone</h2>
            <p style="color: #666; margin-bottom: 15px;">Speak into microphone - analysis every 3 seconds</p>
            <button id="mic-btn" onclick="toggleMic()">🎤 Start Recording</button>
            <div id="mic-results"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let typingTimer;
        let isRecording = false;

        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-content').forEach((c, i) => {
                c.classList.toggle('active', i === index);
            });
        }

        // Real-time text
        document.getElementById('text-input').addEventListener('input', function() {
            clearTimeout(typingTimer);
            const text = this.value;
            
            if (text.length > 10) {
                typingTimer = setTimeout(() => {
                    socket.emit('analyze_text', { text: text });
                }, 2000);
            }
        });

        socket.on('analysis_result', function(data) {
            const div = document.getElementById('text-result');
            const cls = data.is_spam ? 'spam' : 'ham';
            const lbl = data.is_spam ? '⚠️ SCAM' : '✅ Safe';
            
            div.innerHTML = `
                <div class="result ${cls}">
                    <h3>${lbl}</h3>
                    <p>Confidence: ${(data.confidence * 100).toFixed(1)}%</p>
                </div>
            `;
        });

        // Audio file
        document.getElementById('audio-file').addEventListener('change', function() {
            document.getElementById('file-name').textContent = this.files[0]?.name || '';
        });

        async function analyzeAudio() {
            const file = document.getElementById('audio-file').files[0];
            if (!file) return alert('Select a file');

            const formData = new FormData();
            formData.append('audio', file);

            const res = await fetch('/analyze-audio', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.error) return alert(data.error);

            const cls = data.is_spam ? 'spam' : 'ham';
            const lbl = data.is_spam ? '⚠️ SCAM' : '✅ Safe';
            
            document.getElementById('audio-result').innerHTML = `
                <div class="result ${cls}">
                    <h3>${lbl}</h3>
                    <p>Confidence: ${(data.confidence * 100).toFixed(1)}%</p>
                    <div style="background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 10px;">
                        <strong>Transcription:</strong><br>${data.transcribed_text}
                    </div>
                </div>
            `;
        }

        // Microphone
        function toggleMic() {
            const btn = document.getElementById('mic-btn');
            
            if (!isRecording) {
                socket.emit('start_microphone');
                btn.textContent = '⏹️ Stop';
                btn.classList.add('recording');
                isRecording = true;
            } else {
                socket.emit('stop_microphone');
                btn.textContent = '🎤 Start Recording';
                btn.classList.remove('recording');
                isRecording = false;
            }
        }

        socket.on('mic_result', function(data) {
            const div = document.getElementById('mic-results');
            const cls = data.is_spam ? 'spam' : 'ham';
            const lbl = data.is_spam ? '⚠️ SCAM' : '✅ Safe';
            
            div.innerHTML = `
                <div class="result ${cls}" style="margin-top: 15px;">
                    <h3>${lbl}</h3>
                    <p>Confidence: ${(data.confidence * 100).toFixed(1)}%</p>
                    <div style="background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 10px;">
                        <strong>Heard:</strong> ${data.transcribed_text}
                    </div>
                </div>
            ` + div.innerHTML;
        });
    </script>
</body>
</html>
