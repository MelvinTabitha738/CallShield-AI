<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 40px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #333; margin-bottom: 30px; text-align: center; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; resize: vertical; min-height: 120px; font-family: Arial, sans-serif; }
        textarea:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .result { margin-top: 30px; padding: 20px; border-radius: 10px; display: none; }
        .result.spam { background: #fee; border: 2px solid #f88; }
        .result.ham { background: #efe; border: 2px solid #8f8; }
        .result h2 { margin-bottom: 10px; }
        .result.spam h2 { color: #c33; }
        .result.ham h2 { color: #3c3; }
        .confidence { font-size: 14px; color: #666; margin-top: 5px; }
        .error { background: #fee; border: 2px solid #f88; color: #c33; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .loading { display: none; text-align: center; margin-top: 20px; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Spam Detector</h1>
        <textarea id="textInput" placeholder="Enter text message to check if it's spam..."></textarea>
        <button onclick="checkSpam()">Check Message</button>
        <div class="loading" id="loading">Analyzing...</div>
        <div class="error" id="error"></div>
        <div class="result" id="result">
            <h2 id="resultLabel"></h2>
            <p class="confidence" id="confidence"></p>
        </div>
    </div>

    <script>
        async function checkSpam() {
            const text = document.getElementById('textInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loading = document.getElementById('loading');
            
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            
            if (!text) {
                errorDiv.textContent = 'Please enter some text';
                errorDiv.style.display = 'block';
                return;
            }
            
            loading.style.display = 'block';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                    return;
                }
                
                resultDiv.className = 'result ' + data.label;
                resultDiv.style.display = 'block';
                
                if (data.is_spam) {
                    document.getElementById('resultLabel').textContent = '⚠️ SPAM DETECTED';
                } else {
                    document.getElementById('resultLabel').textContent = '✅ LEGITIMATE MESSAGE';
                }
                
                document.getElementById('confidence').textContent = 
                    `Confidence: ${(data.confidence * 100).toFixed(1)}%`;
                
            } catch (error) {
                loading.style.display = 'none';
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
            }
        }
        
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                checkSpam();
            }
        });
    </script>
</body>
</html>
